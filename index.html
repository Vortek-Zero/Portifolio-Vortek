    <!-- Open Graph -->

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <div id="scroll-progress" aria-hidden="true"></div>
    <div id="cursor-glow" aria-hidden="true"></div>
    <div id="noise-overlay" aria-hidden="true"></div>
    <div id="boot-screen" aria-hidden="false">
      <div class="boot-content">
        <div class="boot-line" data-text="[BOOT] Vortek Systems — v2.4.0"></div>
        <div class="boot-line" data-text="[INIT] Kernel loaded. Initializing modules..."></div>
        <div class="boot-line" data-text="[OK]   React engine: READY"></div>
        <div class="boot-line" data-text="[OK]   Three.js runtime: STANDBY"></div>
        <div class="boot-line" data-text="[OK]   Terminal interface: ACTIVE"></div>
        <div class="boot-line boot-done" data-text="[DONE] SYSTEM_READY — Booting desktop..."></div>
      </div>
    </div>
    <script>
      document.addEventListener("mousemove", (e) => {
        document.querySelectorAll(".glow-target").forEach((el) => {
          const r = el.getBoundingClientRect();
          if (r.width === 0) return;
          el.style.setProperty("--gx", ((e.clientX - r.left) / r.width) * 100 + "%");
          el.style.setProperty("--gy", ((e.clientY - r.top) / r.height) * 100 + "%");
        });
        const glow = document.getElementById("cursor-glow");
        if (glow) {
          glow.style.setProperty("--cx", e.clientX + "px");
          glow.style.setProperty("--cy", e.clientY + "px");
        }
      });
      window.addEventListener("scroll", () => {
        const bar = document.getElementById("scroll-progress");
        if (!bar) return;
        const h = document.documentElement.scrollHeight - window.innerHeight;
        bar.style.width = h > 0 ? (window.scrollY / h) * 100 + "%" : "0%";
        const grid = document.querySelector(".bg-grid");
        if (grid) {
          const sy = window.scrollY;
          grid.style.transform = `translate(${sy * 0.15}px, ${sy * 0.1}px)`;
        }
      });
      window.addEventListener("load", () => {
        setTimeout(() => {
          const boot = document.getElementById("boot-screen");
          if (boot) {
            boot.classList.add("boot-fade");
            setTimeout(() => { boot.style.display = "none"; }, 600);
          }
        }, 2800);
      });
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
